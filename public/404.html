<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback: preserve the requested path and forward to root,
      // letting React Router handle the route on the client.
      sessionStorage.setItem("redirect", location.pathname + location.search + location.hash);
      location.replace("/");
    </script>
  </head>
  <body></body>
</html>
